<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Juanito — Verdulería</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body,#root{height:100%;}
  body{background:#0a1a0b;font-family:'Georgia',serif;color:#f0ebe0;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
  script{display:none!important;}
  input,button,textarea,select{font-family:'Georgia',serif;}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#0a1a0b;}
  ::-webkit-scrollbar-thumb{background:#2d4d2d;border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
(function(){
'use strict';
const {useState,useEffect,createElement:h,Fragment} = React;

// ─── STORAGE KEYS ───
const KEY_MIN  = 'j_min_v2';
const KEY_MAY  = 'j_may_v2';
const KEY_PASS = 'j_pass_v1';
const WA       = '56931386116';
const DEF_PASS = 'Juanito2024';

// ─── DATOS INICIALES ───
const MINS0 = [
  {id:1, nombre:'Tomate',   precio:990,  emoji:'🍅',categoria:'Verduras',unidad:'kg',    activo:true},
  {id:2, nombre:'Lechuga',  precio:690,  emoji:'🥬',categoria:'Verduras',unidad:'unidad',activo:true},
  {id:3, nombre:'Zanahoria',precio:590,  emoji:'🥕',categoria:'Verduras',unidad:'kg',    activo:true},
  {id:4, nombre:'Papa',     precio:490,  emoji:'🥔',categoria:'Verduras',unidad:'kg',    activo:true},
  {id:5, nombre:'Cebolla',  precio:590,  emoji:'🧅',categoria:'Verduras',unidad:'kg',    activo:true},
  {id:6, nombre:'Zapallo',  precio:390,  emoji:'🎃',categoria:'Verduras',unidad:'kg',    activo:true},
  {id:7, nombre:'Brócoli',  precio:790,  emoji:'🥦',categoria:'Verduras',unidad:'unidad',activo:true},
  {id:8, nombre:'Choclo',   precio:390,  emoji:'🌽',categoria:'Verduras',unidad:'unidad',activo:true},
  {id:9, nombre:'Manzana',  precio:990,  emoji:'🍎',categoria:'Frutas',  unidad:'kg',    activo:true},
  {id:10,nombre:'Plátano',  precio:790,  emoji:'🍌',categoria:'Frutas',  unidad:'kg',    activo:true},
  {id:11,nombre:'Naranja',  precio:790,  emoji:'🍊',categoria:'Frutas',  unidad:'kg',    activo:true},
  {id:12,nombre:'Limón',    precio:990,  emoji:'🍋',categoria:'Frutas',  unidad:'kg',    activo:true},
  {id:13,nombre:'Uva',      precio:1490, emoji:'🍇',categoria:'Frutas',  unidad:'kg',    activo:true},
  {id:14,nombre:'Frutilla', precio:1690, emoji:'🍓',categoria:'Frutas',  unidad:'kg',    activo:true},
];
const MAYS0 = [
  {id:101,nombre:'Saco de Papa',      emoji:'🥔',unidad:'saco 50kg',  precio:24990,activo:true},
  {id:102,nombre:'Saco de Zanahoria', emoji:'🥕',unidad:'saco 20kg',  precio:8990, activo:true},
  {id:103,nombre:'Cajón de Tomate',   emoji:'🍅',unidad:'cajón 20kg', precio:18990,activo:true},
  {id:104,nombre:'Malla de Cebolla',  emoji:'🧅',unidad:'malla 25kg', precio:12990,activo:true},
  {id:105,nombre:'Caja de Limones',   emoji:'🍋',unidad:'caja 15kg',  precio:10990,activo:true},
  {id:106,nombre:'Caja de Choclos',   emoji:'🌽',unidad:'caja 40und', precio:14990,activo:true},
  {id:107,nombre:'Cajón de Manzanas', emoji:'🍎',unidad:'cajón 18kg', precio:16990,activo:true},
  {id:108,nombre:'Caja de Uvas',      emoji:'🍇',unidad:'caja 8kg',   precio:11990,activo:true},
];

const EMO_V=['🥬','🥕','🥔','🧅','🥦','🌽','🥒','🍆','🌶️','🧄','🥑','🫑','🎃','🍅'];
const EMO_F=['🍎','🍌','🍊','🍋','🍐','🍇','🍓','🍑','🍒','🥭','🍍','🥝','🫐','🍈'];
const EMO_M=['🥔','🥕','🍅','🧅','🍋','🌽','🍎','🍇','🥦','🍌','🍐','🥬','🎃','📦'];
const CATS =['Todos','Verduras','Frutas'];

// ─── HELPERS ───
const fmt = n => '$'+Number(n).toLocaleString('es-CL',{maximumFractionDigits:0});
const ls  = (k,def)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;} };
const lss = (k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{} };

function calcItem(p,item){
  if(!item) return {subtotal:0,label:''};
  if(p.unidad==='unidad') return {subtotal:p.precio*item.cantidad,label:item.cantidad+' und'};
  if(item.modo==='kg') return {subtotal:p.precio*item.cantidad,label:item.cantidad+' kg'};
  const kg=item.cantidad/p.precio;
  return {subtotal:item.cantidad,label:kg.toFixed(2).replace('.',',')+' kg (≈'+fmt(item.cantidad)+')'};
}

// ─── SVG LOGO ───
function LogoSVG(sz){
  return h('svg',{width:sz,height:sz,viewBox:'0 0 100 100',fill:'none'},
    h('circle',{cx:50,cy:50,r:48,fill:'#0e2610',stroke:'#3a7d44',strokeWidth:2}),
    h('ellipse',{cx:30,cy:42,rx:14,ry:8,fill:'#2d6a30',transform:'rotate(-30 30 42)'}),
    h('ellipse',{cx:70,cy:42,rx:14,ry:8,fill:'#2d6a30',transform:'rotate(30 70 42)'}),
    h('rect',{x:48,y:28,width:4,height:22,rx:2,fill:'#3a7d44'}),
    h('circle',{cx:50,cy:60,r:18,fill:'#1e4d22'}),
    h('ellipse',{cx:50,cy:60,rx:13,ry:11,fill:'#2d6a30'}),
    h('ellipse',{cx:50,cy:60,rx:8,ry:7,fill:'#3a7d44'}),
    h('ellipse',{cx:50,cy:60,rx:4,ry:3.5,fill:'#5aab5a'}),
    h('ellipse',{cx:44,cy:54,rx:3,ry:2,fill:'#7ec87e',opacity:0.4})
  );
}
const Logo   = ({size=56})=>LogoSVG(size);
const LogoSm = ()=>LogoSVG(28);

// ─── ESTILOS BASE ───
const S = {
  app:  {minHeight:'100vh',background:'#0a1a0b',fontFamily:"'Georgia',serif",color:'#f0ebe0',position:'relative'},
  rel:  {position:'relative',zIndex:1},
  inp:  {background:'#0f1f10',border:'1px solid #1a321a',borderRadius:12,padding:'0.75rem 1rem',color:'#f0ebe0',fontSize:'0.95rem',outline:'none',fontFamily:'inherit',width:'100%',boxSizing:'border-box'},
  lbl:  {fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.12em',color:'#6ec870'},
  gho:  {background:'none',border:'none',color:'#6ec870',cursor:'pointer',fontSize:'1.3rem',padding:'0.2rem 0.5rem'},
  ovl:  {position:'fixed',inset:0,background:'#000000bb',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'},
  sht:  {background:'#0f1f10',border:'1px solid #243a24',borderRadius:'20px 20px 0 0',padding:'1rem 1.2rem 2rem',width:'100%',maxWidth:480},
  hdl:  {width:36,height:4,background:'#2d4d2d',borderRadius:4,margin:'0 auto 1.2rem'},
  hdr:  {padding:'0.85rem 1.2rem',display:'flex',alignItems:'center',borderBottom:'1px solid #1a321a',position:'sticky',top:0,background:'#0a1a0bdd',backdropFilter:'blur(16px)',zIndex:10},
  grain:{position:'fixed',inset:0,zIndex:0,pointerEvents:'none',opacity:0.5,
         backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E\")"},
};

// ════════════════════════════════════════════
// APP PRINCIPAL
// ════════════════════════════════════════════
function App(){
  const [pan,setPan]   = useState('inicio');
  const [prods,setProds] = useState(()=>ls(KEY_MIN,MINS0));
  const [mays,setMays]   = useState(()=>ls(KEY_MAY,MAYS0));
  const [pass,setPassS]  = useState(()=>ls(KEY_PASS,DEF_PASS));
  const [nid,setNid]     = useState(()=>{ const p=ls(KEY_MIN,MINS0);return Math.max(...p.map(x=>x.id))+1; });
  const [mid,setMid]     = useState(()=>{ const p=ls(KEY_MAY,MAYS0);return Math.max(...p.map(x=>x.id))+1; });

  const [cart,setCart]   = useState({});
  const [cartM,setCartM] = useState({});
  const [cat,setCat]     = useState('Todos');
  const [busq,setBusq]   = useState('');
  const [entrega,setEnt] = useState(null);
  const [form,setForm]   = useState({nombre:'',telefono:'',direccion:'',horario:'',notas:''});
  const [anim,setAnim]   = useState(false);

  // modal cantidad
  const [modP,setModP]   = useState(null);
  const [modo,setModo]   = useState('kg');
  const [val,setVal]     = useState('');

  // modales agregar
  const [modNew,setModNew]   = useState(false);
  const [fNew,setFNew]       = useState({nombre:'',precio:'',emoji:'',categoria:'Verduras',unidad:'kg'});
  const [errNew,setErrNew]   = useState('');
  const [modNewM,setModNewM] = useState(false);
  const [fNewM,setFNewM]     = useState({nombre:'',precio:'',emoji:'📦',unidad:'saco 50kg'});
  const [errNewM,setErrNewM] = useState('');

  // admin
  const [aTab,setATab]     = useState('min');
  const [authed,setAuthed] = useState(false);
  const [aPass,setAPass]   = useState('');
  const [aErr,setAErr]     = useState('');
  const [editP,setEditP]   = useState(null);
  const [editM,setEditM]   = useState(null);
  const [clicks,setClicks] = useState(0);

  // cambiar clave
  const [modClave,setModClave] = useState(false);
  const [clave1,setClave1]     = useState('');
  const [clave2,setClave2]     = useState('');
  const [claveErr,setClaveErr] = useState('');
  const [claveOk,setClaveOk]   = useState('');

  // persist
  useEffect(()=>lss(KEY_MIN,prods),[prods]);
  useEffect(()=>lss(KEY_MAY,mays),[mays]);
  useEffect(()=>lss(KEY_PASS,pass),[pass]);

  const logoClick=()=>{ const n=clicks+1;setClicks(n);if(n>=5){setClicks(0);setPan('alog');} };

  // totales
  const totalIt = Object.keys(cart).length+Object.keys(cartM).length;
  const totalPr = Object.entries(cart).reduce((a,[id,it])=>{
    const p=prods.find(x=>x.id===+id);return a+(p?calcItem(p,it).subtotal:0);
  },0)+Object.entries(cartM).reduce((a,[id,it])=>{
    const p=mays.find(x=>x.id===+id);return a+(p?p.precio*it.cantidad:0);
  },0);

  const pAct = prods.filter(p=>p.activo);
  const mAct = mays.filter(p=>p.activo);
  const pFilt= pAct.filter(p=>(cat==='Todos'||p.categoria===cat)&&p.nombre.toLowerCase().includes(busq.toLowerCase()));

  const abrirMod=p=>{ setModP(p);const ex=cart[p.id];setModo(ex?(ex.modo==='monto'?'monto':'kg'):'kg');setVal(ex?String(ex.cantidad):''); };
  const confirmar=()=>{ const v=parseFloat(val.replace(',','.'));if(!v||v<=0){setModP(null);return;} const m=modP.unidad==='unidad'?'unidad':modo;setCart(prev=>({...prev,[modP.id]:{modo:m,cantidad:v}}));setAnim(true);setTimeout(()=>setAnim(false),400);setModP(null); };
  const delCart =id=>setCart(p=>{const n={...p};delete n[id];return n;});
  const delCartM=id=>setCartM(p=>{const n={...p};delete n[id];return n;});
  const chgM=(id,d)=>setCartM(prev=>{const c=prev[id]?.cantidad||0;const n=Math.max(0,c+d);if(n===0){const x={...prev};delete x[id];return x;}return{...prev,[id]:{cantidad:n}};});

  const prev=(()=>{
    if(!modP||!val)return null;
    const v=parseFloat(val.replace(',','.'));if(!v||v<=0)return null;
    if(modP.unidad==='unidad')return{label:v+' und',subtotal:modP.precio*v};
    if(modo==='kg')return{label:v+' kg → '+fmt(modP.precio*v),subtotal:modP.precio*v};
    const kg=v/modP.precio;return{label:fmt(v)+' → '+kg.toFixed(2).replace('.',',')+' kg',subtotal:v};
  })();

  const saveP=()=>{ if(!fNew.nombre.trim()){setErrNew('Nombre obligatorio');return;} if(!fNew.precio||isNaN(+fNew.precio)||+fNew.precio<=0){setErrNew('Precio inválido');return;} if(!fNew.emoji){setErrNew('Elige un emoji');return;} setProds(p=>[...p,{id:nid,nombre:fNew.nombre.trim(),precio:+fNew.precio,emoji:fNew.emoji,categoria:fNew.categoria,unidad:fNew.unidad,activo:true}]);setNid(n=>n+1);setModNew(false);setFNew({nombre:'',precio:'',emoji:'',categoria:'Verduras',unidad:'kg'}); };
  const saveM=()=>{ if(!fNewM.nombre.trim()){setErrNewM('Nombre obligatorio');return;} if(!fNewM.emoji){setErrNewM('Elige un emoji');return;} setMays(p=>[...p,{id:mid,nombre:fNewM.nombre.trim(),precio:fNewM.precio?+fNewM.precio:0,emoji:fNewM.emoji,unidad:fNewM.unidad,activo:true}]);setMid(n=>n+1);setModNewM(false);setFNewM({nombre:'',precio:'',emoji:'📦',unidad:'saco 50kg'}); };
  const saveEditP=()=>{ if(!editP)return;const pr=parseFloat(editP.precio);if(!pr||pr<=0)return;setProds(prev=>prev.map(p=>p.id===editP.id?{...p,precio:pr,nombre:editP.nombre}:p));setEditP(null); };
  const saveEditM=()=>{ if(!editM)return;const pr=parseFloat(editM.precio)||0;setMays(prev=>prev.map(p=>p.id===editM.id?{...p,precio:pr,nombre:editM.nombre,unidad:editM.unidad}:p));setEditM(null); };
  const togP=id=>setProds(prev=>prev.map(p=>p.id===id?{...p,activo:!p.activo}:p));
  const togM=id=>setMays(prev=>prev.map(p=>p.id===id?{...p,activo:!p.activo}:p));
  const delP=id=>setProds(prev=>prev.filter(p=>p.id!==id));
  const delM=id=>setMays(prev=>prev.filter(p=>p.id!==id));
  const formOk=()=>form.nombre&&form.telefono&&(entrega!=='domicilio'||form.direccion);

  const cambiarClave=()=>{
    setClaveErr('');setClaveOk('');
    if(!clave1.trim()){setClaveErr('Ingresa la nueva clave');return;}
    if(clave1!==clave2){setClaveErr('Las claves no coinciden');return;}
    if(clave1.length<4){setClaveErr('Mínimo 4 caracteres');return;}
    setPassS(clave1);setClave1('');setClave2('');
    setClaveOk('✅ Clave actualizada');
    setTimeout(()=>{setClaveOk('');setModClave(false);},1500);
  };

  const enviar=()=>{
    const lM=Object.entries(cart).map(([id,it])=>{const p=prods.find(x=>x.id===+id);if(!p)return'';const{label,subtotal}=calcItem(p,it);return'  • '+p.emoji+' '+p.nombre+': '+label+' = '+fmt(subtotal);}).filter(Boolean);
    const lY=Object.entries(cartM).map(([id,it])=>{const p=mays.find(x=>x.id===+id);if(!p)return'';return'  • '+p.emoji+' '+p.nombre+': '+it.cantidad+' × '+p.unidad+(p.precio>0?' = '+fmt(p.precio*it.cantidad):'');}).filter(Boolean);
    const ent=entrega==='retiro'?'🏪 Retiro en local':'🛵 Despacho a domicilio\n  📍 '+form.direccion+(form.horario?'\n  🕐 Horario: '+form.horario:'');
    let msg='🥬 *Nuevo pedido - Juanito Verdulería*\n\n👤 *Cliente:* '+form.nombre+'\n📱 *Teléfono:* '+form.telefono+'\n\n*Entrega:* '+ent+'\n';
    if(lM.length)msg+='\n🛒 *Minorista:*\n'+lM.join('\n');
    if(lY.length)msg+='\n\n📦 *Mayorista:*\n'+lY.join('\n');
    msg+='\n\n💰 *TOTAL: '+fmt(totalPr)+'*';
    if(form.notas)msg+='\n\n📝 *Notas:* '+form.notas;
    window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
    setCart({});setCartM({});setForm({nombre:'',telefono:'',direccion:'',horario:'',notas:''});setEnt(null);setPan('ok');
  };

  const login=()=>{ if(aPass===pass){setAuthed(true);setAErr('');setPan('admin');}else setAErr('Contraseña incorrecta'); };

  // ── botón carrito ──
  const BtnCart = (color)=>h('button',{
    onClick:()=>setPan('carrito'),
    style:{background:anim?color:'#162816',border:'1px solid '+color,borderRadius:50,padding:'0.35rem 0.85rem',color:'#f0ebe0',cursor:'pointer',fontSize:'0.85rem',transition:'background 0.3s',display:'flex',alignItems:'center',gap:4}
  },'🛒',totalIt>0&&h('span',{style:{background:color,color:'#fff',borderRadius:'50%',fontSize:'0.65rem',padding:'1px 5px',fontWeight:700}},totalIt));

  // ── modal cantidad ──
  const ModalQ=()=>!modP?null:h('div',{style:S.ovl,onClick:()=>setModP(null)},
    h('div',{onClick:e=>e.stopPropagation(),style:{...S.sht,maxHeight:'80vh',overflowY:'auto'}},
      h('div',{style:S.hdl}),
      h('div',{style:{display:'flex',alignItems:'center',gap:'0.8rem',marginBottom:'1.2rem'}},
        h('span',{style:{fontSize:'2.2rem'}},modP.emoji),
        h('div',null,
          h('div',{style:{fontWeight:400,fontSize:'1.1rem'}},modP.nombre),
          h('div',{style:{color:'#7ec87e',fontSize:'0.85rem'}},fmt(modP.precio)+' / '+modP.unidad)
        )
      ),
      modP.unidad==='kg'&&h('div',{style:{display:'flex',gap:'0.5rem',marginBottom:'1rem'}},
        [{v:'kg',l:'⚖️ Por kilos'},{v:'monto',l:'💰 Por monto ($)'}].map(op=>h('button',{key:op.v,
          onClick:()=>{setModo(op.v);setVal('');},
          style:{flex:1,background:modo===op.v?'#1e4d24':'#162816',border:'1px solid '+(modo===op.v?'#3a7d44':'#243a24'),borderRadius:10,padding:'0.6rem',color:modo===op.v?'#fff':'#7a9a7a',cursor:'pointer',fontFamily:'inherit',fontSize:'0.85rem'}},op.l))
      ),
      h('input',{autoFocus:true,type:'number',
        placeholder:modP.unidad==='unidad'?'Cantidad de unidades':modo==='kg'?'Ej: 0.5  →  medio kilo':'Ej: 3000  →  cuánto gastar',
        value:val,onChange:e=>setVal(e.target.value),onKeyDown:e=>e.key==='Enter'&&confirmar(),
        style:{...S.inp,fontSize:'1.2rem',textAlign:'center',marginBottom:'0.8rem'}}),
      prev&&h('div',{style:{background:'#0e2610',border:'1px solid #2d5a30',borderRadius:10,padding:'0.6rem 1rem',marginBottom:'0.8rem',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('span',{style:{color:'#a8e6a8',fontSize:'0.9rem'}},prev.label),
        h('span',{style:{color:'#7ec87e',fontWeight:700}},fmt(prev.subtotal))
      ),
      h('div',{style:{display:'flex',gap:'0.6rem'}},
        cart[modP.id]&&h('button',{onClick:()=>{delCart(modP.id);setModP(null);},style:{flex:1,background:'#2a1212',border:'1px solid #5a2020',borderRadius:12,padding:'0.8rem',color:'#e07070',cursor:'pointer',fontFamily:'inherit',fontSize:'0.9rem'}},'🗑 Quitar'),
        h('button',{onClick:confirmar,style:{flex:2,background:prev?'linear-gradient(135deg,#2d6a30,#3a7d44)':'#162816',border:'none',borderRadius:12,padding:'0.8rem',color:prev?'#fff':'#5a7a5a',cursor:prev?'pointer':'not-allowed',fontFamily:'inherit',fontSize:'0.95rem',fontWeight:600}},cart[modP.id]?'Actualizar ✓':'Agregar al pedido ✓')
      )
    )
  );

  // ════ INICIO ════
  if(pan==='inicio') return h('div',{style:S.app},
    h('div',{style:S.grain}),
    h('div',{style:{...S.rel,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'2rem',textAlign:'center'}},
      h('div',{style:{position:'fixed',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,#1a4d2055 0%,transparent 70%)',top:-150,right:-150,pointerEvents:'none'}}),
      h('div',{style:{position:'fixed',width:350,height:350,borderRadius:'50%',background:'radial-gradient(circle,#2d6a1d44 0%,transparent 70%)',bottom:-80,left:-100,pointerEvents:'none'}}),
      h('div',{style:{marginBottom:'1.2rem',filter:'drop-shadow(0 0 40px #3a7d4466)',cursor:'pointer'},onClick:logoClick},h(Logo,{size:90})),
      h('p',{style:{letterSpacing:'0.4em',fontSize:'0.7rem',color:'#6ec870',textTransform:'uppercase',margin:'0 0 0.3rem'}},'Verdulería'),
